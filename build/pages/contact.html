<main>
<section id="contact" class="slide contact-section festival-block">
    <div class="contact-container">

        <div class="contact-left-col">
            <div class="artist-social-links">
                <a href="https://www.instagram.com/orelsan/?hl=fr" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/orelsan/?locale=fr_FR" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://x.com/Orel_san?lang=fr" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="https://open.spotify.com/intl-fr/artist/4FpJcNgOvIpSBeJgRg3OfN" target="_blank" aria-label="Spotify"><i class="fab fa-spotify"></i></a>
            </div>
            <p class="copyright-text">Blitz ©</p>
        </div> <div class="contact-right-col">
        <h2 class="contact-main-title">Contactez-nous</h2>

        <form class="contact-form">
            <div class="form-row-double">
                <div class="form-group">
                    <label for="nom">nom<span class="pink-star">*</span></label>
                    <input type="text" id="nom" name="nom" placeholder="nom" required>
                </div>
                <div class="form-group">
                    <label for="prenom">prénom<span class="pink-star">*</span></label>
                    <input type="text" id="prenom" name="prenom" placeholder="prenom" required>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="email">email<span class="pink-star">*</span></label>
                <input type="email" id="email" name="email" placeholder="exemple@gmail.com" required>
            </div>

            <div class="form-group full-width">
                <label for="message">message</label>
                <!-- On utilise un textarea avec l'événement oninput qui recalcule sa hauteur -->
                <textarea id="message" name="message" rows="1" oninput="autoExpand(this)" placeholder="Écrivez votre message..."></textarea>
            </div>

            <div class="form-submit-block">
                <button type="submit" class="btn-submit">envoyer</button>
            </div>
        </form>
    </div>

    </div>
</section>

        </div>
